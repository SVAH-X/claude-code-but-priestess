<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PRTS</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="bar" id="dragHandle">
      <div class="bar-title">
        <span class="dot" aria-hidden="true"></span>
        <span>PRTS</span>
        <span class="version-badge" id="versionBadge" title="App version"></span>
        <span class="provider-badge" id="providerBadge">Detecting...</span>
        <span class="agent-badge" id="agentBadge" hidden>⚡ agent</span>
      </div>
      <div class="bar-actions">
        <button type="button" id="clearBtn" class="ghost" title="Clear conversation">Clear</button>
        <button type="button" id="cancelBtn" class="ghost" title="Stop response" disabled>Stop</button>
      </div>
    </header>

    <section class="stage" id="petStage">
      <canvas id="petCanvas" width="380" height="180"></canvas>
      <div class="bubble" id="petBubble" aria-live="polite"></div>
    </section>

    <div class="main-area" id="mainArea">
      <main class="chat-stream" id="chatStream" aria-live="polite"></main>
      <div class="preview-divider" id="previewDivider" hidden aria-hidden="true"></div>
      <aside class="html-preview" id="htmlPreview" hidden>
        <header class="preview-header">
          <span class="preview-title" id="previewTitle">HTML Preview</span>
          <div class="preview-actions">
            <button type="button" id="openInBrowserBtn" class="ghost preview-btn" title="Open in default browser">Open in Browser</button>
            <button type="button" id="closePreviewBtn" class="ghost preview-btn preview-close" title="Close preview">&times;</button>
          </div>
        </header>
        <!-- No allow-same-origin: combined with allow-scripts on a srcdoc
             iframe it would defeat the sandbox entirely — the (model- or
             web-derived) HTML would be same-origin with the app UI and could
             reach window.parent and the bridged IPC APIs. Without it, scripts
             still run but in an opaque origin that cannot touch the app. -->
        <iframe id="previewFrame"
                sandbox="allow-scripts allow-forms allow-modals"
                srcdoc=""
                title="HTML Preview"
                allow="clipboard-write"></iframe>
      </aside>
    </div>

    <footer class="composer">
      <form id="composer" autocomplete="off">
        <textarea
          id="composerInput"
          placeholder="Talk to her…  (Shift+Enter for newline)"
          rows="1"
          spellcheck="false"
        ></textarea>
        <button type="submit" id="sendBtn" class="primary" aria-label="Send">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 12l16-8-6 16-3-7-7-1z" />
          </svg>
        </button>
      </form>
      <p class="cwd-line" id="cwdLine"></p>
    </footer>

    <div class="resize-edge e" data-edge="e" aria-hidden="true"></div>
    <div class="resize-edge w" data-edge="w" aria-hidden="true"></div>
    <div class="resize-edge s" data-edge="s" aria-hidden="true"></div>
    <div class="resize-edge sw" data-edge="sw" aria-hidden="true"></div>
    <div class="resize-grip resize-edge se" data-edge="se" aria-hidden="true"></div>

    <script src="./renderer.js"></script>
  </body>
</html>
